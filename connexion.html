<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <title>Connexion - TrafficFlow</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1A0A00, #2C1A0E);
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-tab.active {
            color: #C9A96E;
            border-bottom: 3px solid #C9A96E;
        }
        .form-group { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #C9A96E;
            color: #1A0A00;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .social-btn {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            font-weight: 600;
            cursor: pointer;
        }
        .consent {
            margin: 20px 0;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2 style="text-align:center; margin-bottom:8px;">Bienvenue sur TrafficFlow</h2>
        <p style="text-align:center; color:#666; margin-bottom:30px;">Connectez-vous pour accéder à toutes les fonctionnalités</p>

        <!-- Tabs -->
        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login">Connexion</div>
            <div class="auth-tab" id="tab-register">Inscription</div>
        </div>

        <!-- Formulaire Connexion -->
        <div id="login-form">
            <div class="form-group">
                <input type="email" id="login-email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="login-password" placeholder="Mot de passe" required>
            </div>
            <button class="btn-primary" onclick="handleLogin()">Se connecter</button>
        </div>

        <!-- Formulaire Inscription -->
        <div id="register-form" style="display:none;">
            <div class="form-group">
                <input type="text" id="register-nom" placeholder="Votre nom complet" required>
            </div>
            <div class="form-group">
                <input type="email" id="register-email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="register-password" placeholder="Mot de passe (min. 6 caractères)" required>
            </div>

            <!-- Consentement -->
            <div class="consent">
                <input type="checkbox" id="consent-check" required>
                <label for="consent-check">
                    J’accepte la 
                    <a href="politique-confidentialite.html" target="_blank">Politique de Confidentialité</a> 
                    et les 
                    <a href="cgu.html" target="_blank">Conditions Générales d’Utilisation</a> 
                    de TrafficFlow.
                </label>
            </div>

            <button class="btn-primary" onclick="handleSignup()">Créer mon compte</button>
        </div>

        <!-- Connexion Sociale -->
        <div style="margin: 25px 0; text-align:center;">
            <p style="color:#888; margin-bottom:15px;">Ou continuer avec</p>
            <button class="social-btn" onclick="signInWithGoogle()">🌐 Continuer avec Google</button>
            <button class="social-btn" onclick="signInWithApple()"> Continuer avec Apple</button>
        </div>
    </div>
</div>

<script>
// Gestion des onglets
document.getElementById('tab-login').addEventListener('click', () => {
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('register-form').style.display = 'none';
    document.getElementById('tab-login').classList.add('active');
    document.getElementById('tab-register').classList.remove('active');
});

document.getElementById('tab-register').addEventListener('click', () => {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = 'block';
    document.getElementById('tab-register').classList.add('active');
    document.getElementById('tab-login').classList.remove('active');
});

async function handleLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;

    const { error } = await auth.login(email, password);
    if (error) {
        alert("Erreur de connexion : " + error.message);
    } else {
        window.location.href = 'dashboard.html';
    }
}

async function handleSignup() {
    const nom = document.getElementById('register-nom').value;
    const email = document.getElementById('register-email').value;
    const password = document.getElementById('register-password').value;

    if (!document.getElementById('consent-check').checked) {
        alert("Vous devez accepter la Politique de Confidentialité et les Conditions Générales.");
        return;
    }

    const { error } = await auth.signup(email, password, nom);
    if (error) {
        alert("Erreur d'inscription : " + error.message);
    } else {
        alert("Compte créé avec succès ! Vous pouvez maintenant vous connecter.");
        document.getElementById('tab-login').click();
    }
}

function signInWithGoogle() { alert("Fonctionnalité Google bientôt disponible."); }
function signInWithApple() { alert("Fonctionnalité Apple bientôt disponible."); }
</script>
<script src="cookie-consent.js"></script>

</body>
</html>
